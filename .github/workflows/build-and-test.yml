name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

env:
  JDK_WINDOWS: 25
  JDK_SONAR: 17

  SONAR_PLUGIN_VERSION: 5.5.0.6356

jobs:
  windows-tests:
    name: Build and Test (Windows)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JDK_WINDOWS }}
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests
        run: mvn -B clean verify

      - name: Upload test & coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts
          path: |
            target/surefire-reports
            target/site/jacoco

  sonar:
    name: Sonar Analysis (Linux)
    runs-on: ubuntu-latest
    needs: windows-tests
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JDK_SONAR }}
          distribution: temurin

      - name: Download test artifacts
        uses: actions/download-artifact@v8
        with:
          name: test-artifacts
          path: target

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Sonar scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run:
          mvn -B verify -DskipTests org.sonarsource.scanner.maven:sonar-maven-plugin:${{ env.SONAR_PLUGIN_VERSION }}:sonar -Dsonar.projectKey=eggy03_cimari -Dsonar.coverage.exclusions=**/annotation/**,**/entity/**,**/exception/**,**/shell**
